site_name: Cubectl Documentation
site_url: https://cubectlmc.github.io/docs/
repo_url: https://github.com/CubectlMC/docs
repo_name: CubectlMC/docs
docs_dir: content

theme:
  name: material
  language: ru
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy

nav:
  - Главная: index.md
  - RFC:
      - Архитектура: rfc/architecture.md
      - MVP: rfc/mvp.md
  - Архитектура:
      - Микросервисы: architecture/services.md
      - Пакеты: architecture/packages.md
      - Данные и PostgreSQL: architecture/data.md
      - Безопасность: architecture/security.md
      - Docker: architecture/docker.md
      - Файлы и каталоги: architecture/files.md
      - Runtime и логи: architecture/observability.md
  - Базы данных:
      - Обзор: database/index.md
      - Identity: database/identity.md
      - Instance: database/instance.md
      - File: database/file.md
      - ER-диаграмма: database/schema.md
  - API:
      - Endpoints: api/endpoints.md
      - OpenAPI: api/openapi/index.md
  - UI:
      - Экраны: ui/screens.md
  - Future:
      - DNS: architecture/dns.md
  - Диаграммы:
      - Взаимодействие сервисов: diagrams/service-interaction.md
      - Установка мода: diagrams/mod-installation.md

plugins:
  - search
  - plantuml:
      puml_url: https://www.plantuml.com/plantuml/

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
