openapi: 3.1.0
info:
  title: Cubectl Metric API
  version: 0.1.0
servers:
  - url: /api/v1
paths:
  /instances/{instance_id}/metrics/current:
    get:
      summary: Получить текущую runtime-информацию инстанса
      tags: [instance-metrics]
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Текущая runtime-информация инстанса
  /instances/{instance_id}/metrics/live:
    get:
      summary: Открыть SSE-поток runtime-информации инстанса
      tags: [instance-metrics]
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SSE-поток runtime-информации инстанса
  /metrics/host/current:
    get:
      summary: Получить текущую runtime-информацию хоста
      tags: [host-metrics]
      responses:
        "200":
          description: Текущая runtime-информация хоста
  /metrics/host/live:
    get:
      summary: Открыть SSE-поток runtime-информации хоста
      tags: [host-metrics]
      responses:
        "200":
          description: SSE-поток runtime-информации хоста
